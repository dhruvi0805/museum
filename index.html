<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Museum Timeline — Chronology of Art</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HAMBURGER BUTTON (mobile only) -->
  <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

  <!-- MOBILE NAV OVERLAY -->
  <nav class="mobile-overlay" id="mobileOverlay" aria-hidden="true">
    <button class="overlay-close" id="overlayClose" aria-label="Close navigation">&#215;</button>
    <ul class="overlay-links" id="overlayLinks"></ul>
  </nav>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-line">MUSEUM</span>
        <span class="logo-sub">CHRONOLOGY</span>
      </div>
      <nav class="sidebar-nav">
        <ul id="sidebarLinks"></ul>
      </nav>
      <div class="sidebar-footer">
        <span>© 2025</span>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content" id="content">
      <header class="page-header">
        <p class="header-eyebrow">Permanent Collection</p>
        <h1 class="page-title">Art Through<br>the Ages</h1>
        <p class="page-intro">
          A cinematic timeline of world art movements, arranged chronologically with contextual museum notes.
        </p>
        <div class="explore-controls" aria-label="Explore eras">
          <label class="control-group">
            <span class="control-label">Search</span>
            <input id="searchInput" class="control-input" type="search" placeholder="Artist, movement, period..." />
          </label>
          <label class="control-group">
            <span class="control-label">Filter</span>
            <select id="filterSelect" class="control-input">
              <option value="all">All Eras</option>
            </select>
          </label>
        </div>
        <div class="header-rule"></div>
      </header>

      <section class="compare-panel fade-target" id="comparePanel" aria-label="Compare movements">
        <div class="compare-head">
          <p class="compare-kicker">Compare Movements</p>
          <h2 class="compare-title">Contrast two eras quickly</h2>
        </div>
        <div class="compare-controls">
          <label class="control-group">
            <span class="control-label">Movement A</span>
            <select id="compareSelectA" class="control-input"></select>
          </label>
          <label class="control-group">
            <span class="control-label">Movement B</span>
            <select id="compareSelectB" class="control-input"></select>
          </label>
        </div>
        <div id="compareResult" class="compare-result"></div>
      </section>

      <div id="sectionsContainer"></div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
